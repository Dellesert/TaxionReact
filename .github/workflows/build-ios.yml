name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - production
          - development

env:
  NODE_VERSION: '20'

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode and install iOS runtime
        run: |
          # List available Xcode versions
          ls -la /Applications/ | grep Xcode

          # Use Xcode 16.1
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

          # Show current state
          xcodebuild -version
          xcodebuild -showsdks

          # Install iOS 18.1 simulator runtime (required for storyboard compilation)
          echo "Installing iOS 18.1 simulator runtime..."
          xcrun simctl runtime add "iOS 18.1" || echo "Runtime may already be installed or unavailable"

          # List available runtimes
          xcrun simctl list runtimes || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install
        env:
          LANG: en_US.UTF-8

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Import provisioning profiles
        env:
          DEV_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_DEV_PROVISIONING_PROFILE_BASE64 }}
          PROD_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROD_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Import development profile
          if [ -n "$DEV_PROVISIONING_PROFILE_BASE64" ]; then
            DEV_PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles/dev_profile.mobileprovision
            echo -n "$DEV_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$DEV_PROFILE_PATH"
            # Get UUID from profile
            DEV_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$DEV_PROFILE_PATH"))
            # Copy with UUID as filename (required by Xcode)
            cp "$DEV_PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${DEV_PROFILE_UUID}.mobileprovision
            echo "Development profile imported with UUID: $DEV_PROFILE_UUID"
            echo "DEV_PROFILE_UUID=$DEV_PROFILE_UUID" >> $GITHUB_ENV
          fi

          # Import production profile
          if [ -n "$PROD_PROVISIONING_PROFILE_BASE64" ]; then
            PROD_PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles/prod_profile.mobileprovision
            echo -n "$PROD_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROD_PROFILE_PATH"
            # Get UUID from profile
            PROD_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROD_PROFILE_PATH"))
            # Copy with UUID as filename (required by Xcode)
            cp "$PROD_PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PROD_PROFILE_UUID}.mobileprovision
            echo "Production profile imported with UUID: $PROD_PROFILE_UUID"
            echo "PROD_PROFILE_UUID=$PROD_PROFILE_UUID" >> $GITHUB_ENV
          fi

      - name: Fix assets and storyboard for CI
        run: |
          # Remove problematic asset catalogs that require simulator runtimes
          # This is a known issue with expo-dev-launcher on CI without simulator SDKs
          find node_modules -name "Assets.xcassets" -path "*/expo-dev-launcher/*" -exec rm -rf {} + 2>/dev/null || true

          # Create empty asset catalog to prevent build errors
          mkdir -p node_modules/expo-dev-launcher/ios/Assets.xcassets
          cat > node_modules/expo-dev-launcher/ios/Assets.xcassets/Contents.json << 'EOF'
          {
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF

          # Replace SplashScreen.storyboard with a minimal version that doesn't require specific iOS runtime
          # This is necessary because ibtool requires simulator runtime to compile storyboards
          if [ -f "ios/Tahion/SplashScreen.storyboard" ]; then
            cat > ios/Tahion/SplashScreen.storyboard << 'STORYBOARD'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_1" orientation="portrait" appearance="light"/>
              <dependencies>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21678"/>
                  <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                  <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="414" height="896"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <imageView clipsSubviews="YES" userInteractionEnabled="NO" contentMode="scaleAspectFit" horizontalHuggingPriority="251" verticalHuggingPriority="251" image="SplashScreenBackground" translatesAutoresizingMaskIntoConstraints="NO" id="splash-image">
                                          <rect key="frame" x="0.0" y="0.0" width="414" height="896"/>
                                      </imageView>
                                  </subviews>
                                  <viewLayoutGuide key="safeArea" id="Bcu-3y-fUS"/>
                                  <color key="backgroundColor" red="0.91372549019607843" green="0.26666666666666666" blue="0.26666666666666666" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                  <constraints>
                                      <constraint firstItem="splash-image" firstAttribute="top" secondItem="Ze5-6b-2t3" secondAttribute="top" id="c1"/>
                                      <constraint firstItem="splash-image" firstAttribute="bottom" secondItem="Ze5-6b-2t3" secondAttribute="bottom" id="c2"/>
                                      <constraint firstItem="splash-image" firstAttribute="leading" secondItem="Ze5-6b-2t3" secondAttribute="leading" id="c3"/>
                                      <constraint firstItem="splash-image" firstAttribute="trailing" secondItem="Ze5-6b-2t3" secondAttribute="trailing" id="c4"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
              <resources>
                  <image name="SplashScreenBackground" width="1" height="1"/>
              </resources>
          </document>
          STORYBOARD
            echo "Replaced SplashScreen.storyboard with minimal version"
          fi

      - name: Build Development Client
        if: ${{ github.event.inputs.build_type == 'development' || github.event.inputs.build_type == 'both' }}
        run: |
          xcodebuild -workspace ios/Tahion.xcworkspace \
            -scheme Tahion \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Tahion-Dev.xcarchive \
            archive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Apple Development" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE=$DEV_PROFILE_UUID \
            ONLY_ACTIVE_ARCH=NO \
            EXCLUDED_ARCHS="i386 x86_64" \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES

      - name: Export Development IPA
        if: ${{ github.event.inputs.build_type == 'development' || github.event.inputs.build_type == 'both' }}
        run: |
          mkdir -p build

          cat > build/ExportOptions-Dev.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.dellesert.tachyon-messenger</key>
                  <string>$DEV_PROFILE_UUID</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/Tahion-Dev.xcarchive \
            -exportPath build/ipa-dev \
            -exportOptionsPlist build/ExportOptions-Dev.plist

          mv build/ipa-dev/Tahion.ipa build/ipa-dev/Tahion-DevClient.ipa

      - name: Update Bundle ID for Production
        if: ${{ github.event.inputs.build_type == 'production' || github.event.inputs.build_type == 'both' }}
        run: |
          # Set production bundle ID only for Release configuration
          # Find the Release section and change bundle ID there
          # Use awk to change only the second occurrence (Release config)
          awk '
            /PRODUCT_BUNDLE_IDENTIFIER = "com.dellesert.tachyon-messenger"/ {
              count++
              if (count == 2) {
                sub(/com.dellesert.tachyon-messenger/, "com.dellesert.tachyon-messenger.release")
              }
            }
            { print }
          ' ios/Tahion.xcodeproj/project.pbxproj > ios/Tahion.xcodeproj/project.pbxproj.tmp
          mv ios/Tahion.xcodeproj/project.pbxproj.tmp ios/Tahion.xcodeproj/project.pbxproj

          echo "Bundle IDs after update:"
          grep "PRODUCT_BUNDLE_IDENTIFIER" ios/Tahion.xcodeproj/project.pbxproj

      - name: Build Production Release
        if: ${{ github.event.inputs.build_type == 'production' || github.event.inputs.build_type == 'both' }}
        env:
          EXPO_PUBLIC_API_BASE_URL: https://taxion.fusioninsight.cloud/api/v1
          EXPO_PUBLIC_WS_URL: wss://taxion.fusioninsight.cloud
          EXPO_PUBLIC_ENV: production
        run: |
          xcodebuild -workspace ios/Tahion.xcworkspace \
            -scheme Tahion \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Tahion-Release.xcarchive \
            archive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Apple Development" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE=$PROD_PROFILE_UUID \
            ONLY_ACTIVE_ARCH=NO \
            EXCLUDED_ARCHS="i386 x86_64"

      - name: Export Production IPA
        if: ${{ github.event.inputs.build_type == 'production' || github.event.inputs.build_type == 'both' }}
        run: |
          cat > build/ExportOptions-Prod.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.dellesert.tachyon-messenger.release</key>
                  <string>$PROD_PROFILE_UUID</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/Tahion-Release.xcarchive \
            -exportPath build/ipa-prod \
            -exportOptionsPlist build/ExportOptions-Prod.plist

          mv build/ipa-prod/Tahion.ipa build/ipa-prod/Tahion-Production.ipa

      - name: Upload Development IPA
        if: ${{ github.event.inputs.build_type == 'development' || github.event.inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: Tahion-DevClient-IPA
          path: build/ipa-dev/Tahion-DevClient.ipa
          retention-days: 30

      - name: Upload Production IPA
        if: ${{ github.event.inputs.build_type == 'production' || github.event.inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: Tahion-Production-IPA
          path: build/ipa-prod/Tahion-Production.ipa
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/ipa-dev/Tahion-DevClient.ipa
            build/ipa-prod/Tahion-Production.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
