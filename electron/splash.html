<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tachyon Messenger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background-color: #E94444;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag; /* Make window draggable */
    }

    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease-in;
    }

    .logo {
      width: 120px;
      height: 120px;
      animation: pulse 2s ease-in-out infinite;
    }

    /* SVG fallback logo when image fails to load */
    .logo-fallback {
      width: 120px;
      height: 120px;
      animation: pulse 2s ease-in-out infinite;
      display: none;
    }

    .logo-fallback.show {
      display: block;
    }

    .logo.hidden {
      display: none;
    }

    .app-name {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 24px;
      font-weight: 600;
      margin-top: 24px;
      letter-spacing: 0.5px;
    }

    .loading-spinner {
      margin-top: 32px;
      width: 28px;
      height: 28px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <img id="logo" alt="Tachyon Logo" class="logo">
    <!-- SVG fallback -->
    <svg class="logo-fallback" id="logo-fallback" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" fill="white" opacity="0.9"/>
      <text x="50" y="60" text-anchor="middle" font-size="40" font-weight="bold" fill="#E94444">T</text>
    </svg>
    <div class="app-name">Тахион</div>
    <div class="loading-spinner"></div>
  </div>
  <script>
    const logo = document.getElementById('logo');
    const fallback = document.getElementById('logo-fallback');

    // Try multiple paths in order
    const paths = [
      '../assets/images/icon_alpha.png',           // Dev path
      './icon_alpha.png',                           // Same directory
      'icon_alpha.png'                              // Current directory
    ];

    let pathIndex = 0;

    function tryNextPath() {
      if (pathIndex < paths.length) {
        logo.src = paths[pathIndex];
        pathIndex++;
      } else {
        // All paths failed, show SVG fallback
        logo.classList.add('hidden');
        fallback.classList.add('show');
      }
    }

    logo.onerror = tryNextPath;
    logo.onload = function() {
      // Image loaded successfully
      logo.classList.remove('hidden');
      fallback.classList.remove('show');
    };

    // Start loading
    tryNextPath();
  </script>
</body>
</html>
