<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tachyon Messenger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background-color: #E94444;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag; /* Make window draggable */
    }

    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease-in;
    }

    .logo {
      width: 120px;
      height: 120px;
      animation: pulse 2s ease-in-out infinite;
    }

    .app-name {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 24px;
      font-weight: 600;
      margin-top: 24px;
      letter-spacing: 0.5px;
    }

    .loading-spinner {
      margin-top: 32px;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <img src="../assets/images/icon_alpha.png" alt="Tachyon Logo" class="logo">
    <div class="app-name">Тахион</div>
    <div class="loading-spinner"></div>
  </div>
</body>
</html>
